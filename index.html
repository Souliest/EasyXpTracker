<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming Tools</title>
  <link rel="stylesheet" href="common/theme.css">
  <style>
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 520px;
      margin: 0 auto 2rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 0.05em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    button.theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.2rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    button.theme-toggle:hover {
      border-color: var(--accent);
    }

    p.subtitle {
      max-width: 520px;
      margin: 0 auto 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tools {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    a.tool {
      display: block;
      padding: 1.1rem 1.4rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    a.tool:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    a.tool .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    a.tool .desc {
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
<header>
  <h1>Gaming Tools</h1>
  <div class="header-actions">
    <button class="auth-btn" id="authBtn" title="Account">👤</button>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<p class="subtitle">A small collection of handy utilities.</p>

<div class="tools" id="toolList"></div>

<!-- ═══════════════════════════════════════════════════════════════
     MIGRATION TOOL — remove this entire block after migrating
     ═══════════════════════════════════════════════════════════════ -->
<div id="migrationArea"
     style="display:none; max-width:520px; margin:2rem auto 0; font-family:'Share Tech Mono',monospace; font-size:0.85rem;">
  <button id="migrateBtn" onclick="runMigration()" style="padding:8px 16px; cursor:pointer;">Migrate localStorage to
    Supabase
  </button>
  <pre id="migrateLog" style="margin-top:0.8rem; color:var(--muted); white-space:pre-wrap; line-height:1.6;"></pre>
</div>
<script type="module">
    import {supabase} from './common/supabase.js';
    import {getUser} from './common/auth.js';

    const LGT_LOCAL_KEY = 'bgt:level-goal-tracker:data';
    const TC_LOCAL_KEY = 'bgt:thing-counter:data';
    const LGT_SEL_KEY = 'bgt:level-goal-tracker:selected-game';
    const TC_SEL_KEY = 'bgt:thing-counter:selected-game';
    const LGT_TABLE = 'bgt_level_goal_tracker_games';
    const TC_TABLE = 'bgt_thing_counter_games';

    function log(msg) {
        document.getElementById('migrateLog').textContent += msg + '\n';
    }

    async function migrateGames(label, localKey, selKey, table) {
        log('\n\u2500\u2500 ' + label + ' \u2500\u2500');
        let raw;
        try {
            raw = JSON.parse(localStorage.getItem(localKey));
        } catch {
            raw = null;
        }
        if (!raw || !raw.games || raw.games.length === 0) {
            log('  No games found in localStorage.');
            return;
        }
        const user = getUser();
        const now = new Date().toISOString();
        const selId = localStorage.getItem(selKey);
        let newSelId = null;
        for (const game of raw.games) {
            const oldId = game.id;
            const newId = crypto.randomUUID();
            game.id = newId;
            game.last_modified = now;
            if (oldId === selId) newSelId = newId;
            const {error} = await supabase.from(table).upsert({
                id: newId,
                user_id: user.id,
                name: game.name,
                data: game,
                updated_at: now,
            }, {onConflict: 'id'});
            if (error) {
                log('  \u2717 "' + game.name + '" \u2014 ' + error.message);
            } else {
                log('  \u2713 "' + game.name + '"  (' + oldId + ' \u2192 ' + newId + ')');
            }
        }
        localStorage.setItem(localKey, JSON.stringify(raw));
        if (newSelId) localStorage.setItem(selKey, newSelId);
        else if (selId) localStorage.removeItem(selKey);
        log('  localStorage updated with new UUIDs.');
    }

    window.runMigration = async function () {
        const btn = document.getElementById('migrateBtn');
        btn.disabled = true;
        btn.textContent = 'Migrating\u2026';
        document.getElementById('migrateLog').textContent = '';
        const user = getUser();
        if (!user) {
            log('Not logged in.');
            btn.disabled = false;
            return;
        }
        log('Logged in as: ' + user.email);
        await migrateGames('Level Goal Tracker', LGT_LOCAL_KEY, LGT_SEL_KEY, LGT_TABLE);
        await migrateGames('Thing Counter', TC_LOCAL_KEY, TC_SEL_KEY, TC_TABLE);
        log('\nDone. You can now remove the migration block from index.html.');
        btn.textContent = 'Migration complete';
    };

    function updateMigrationVisibility() {
        document.getElementById('migrationArea').style.display = getUser() ? 'block' : 'none';
    }

    supabase.auth.onAuthStateChange(() => updateMigrationVisibility());
    setTimeout(updateMigrationVisibility, 300);
</script>
<!-- ═══════════════════════════════════════════════════════════════
     END MIGRATION TOOL
     ═══════════════════════════════════════════════════════════════ -->

<script src="common/tools.js"></script>
<script src="common/theme.js"></script>
<script>
    const list = document.getElementById('toolList');
    TOOLS.forEach(tool => {
        const a = document.createElement('a');
        a.className = 'tool';
        a.href = tool.path;
        a.innerHTML =
            '<div class="name">' + tool.name + '</div>' +
            (tool.description ? '<div class="desc">' + tool.description + '</div>' : '');
        list.appendChild(a);
    });
    initTheme();
</script>
<script type="module">
    import {initAuth} from './common/auth-ui.js';

    initAuth();
</script>
</body>
</html>
