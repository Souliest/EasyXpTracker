<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming Tools</title>
  <link rel="stylesheet" href="common/theme.css">
  <style>
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 520px;
      margin: 0 auto 2rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 0.05em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    button.theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.2rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    button.theme-toggle:hover {
      border-color: var(--accent);
    }

    p.subtitle {
      max-width: 520px;
      margin: 0 auto 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tools {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    a.tool {
      display: block;
      padding: 1.1rem 1.4rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    a.tool:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    a.tool .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    a.tool .desc {
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
<header>
  <h1>Gaming Tools</h1>
  <div class="header-actions">
    <button class="auth-btn" id="authBtn" title="Account">👤</button>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<p class="subtitle">A small collection of handy utilities.</p>

<div class="tools" id="toolList"></div>

<script src="common/tools.js"></script>
<script src="common/theme.js"></script>
<script>
    const list = document.getElementById('toolList');
    TOOLS.forEach(tool => {
        const a = document.createElement('a');
        a.className = 'tool';
        a.href = tool.path;
        a.innerHTML =
            '<div class="name">' + tool.name + '</div>' +
            (tool.description ? '<div class="desc">' + tool.description + '</div>' : '');
        list.appendChild(a);
    });
    initTheme();
</script>
<script type="module">
    import {initAuth} from './common/auth-ui.js';

    initAuth();
</script>
</body>
</html>
