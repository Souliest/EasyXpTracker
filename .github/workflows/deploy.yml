name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into supabase.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Fail loudly if either secret is missing rather than deploying
          # a broken site with literal placeholder strings in it.
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret is not set." >&2
            exit 1
          fi
          if [ -z "$SUPABASE_KEY" ]; then
            echo "ERROR: SUPABASE_KEY secret is not set." >&2
            exit 1
          fi

          find . -path './.git' -prune -o -name 'supabase.js' -print | \
            xargs sed -i \
              -e "s|__SUPABASE_URL__|${SUPABASE_URL}|g" \
              -e "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g"

          # Verify substitution actually happened — catches typos in placeholder names.
          if grep -r '__SUPABASE_URL__\|__SUPABASE_KEY__' --include='supabase.js' .; then
            echo "ERROR: Placeholder strings still present after substitution." >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'